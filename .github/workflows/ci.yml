name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Checkout superkassa-delivery
      uses: actions/checkout@v4
      with:
        repository: texport/superkassa-delivery
        path: deps/superkassa-delivery

    - name: Build superkassa-delivery
      run: |
        cd deps/superkassa-delivery
        chmod +x ../../gradlew
        ../../gradlew publishToMavenLocal --info --stacktrace

    - name: Checkout superkassa-core
      uses: actions/checkout@v4
      with:
        repository: texport/superkassa-core
        path: deps/superkassa-core

    - name: Build superkassa-core
      run: |
        cd deps/superkassa-core
        chmod +x ../../gradlew
        ../../gradlew publishToMavenLocal --info --stacktrace

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Detekt Static Analysis
      run: ./gradlew detekt

    - name: Run Tests
      run: ./gradlew test
